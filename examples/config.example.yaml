# ai-brand-monitor 設定ファイル例
# このファイルを config.yaml にコピーして編集してください。
# cp examples/config.example.yaml config.yaml

# --- ブランド情報 ---
# name: AI応答内でマッチングに使うブランド名
# domain: 引用リンク検出に使うドメイン
# aliases: 略称・別表記など（部分一致で検出）
brand:
  name: "オーラサウンド"
  domain: "aurasound.example.com"
  aliases:
    - "AuraSound"
    - "Aura Sound"
    - "オーラサウンド社"

# --- 競合ブランド ---
# 自社と同じ検索結果に出てくる競合を登録
# AI応答内での言及頻度・順位を比較できる
competitors:
  - name: "ノイズマスター"
    domain: "noisemaster.example.com"
  - name: "ソニックブースト"
    domain: "sonicboost.example.com"

# --- ロケール ---
# language: 検索・プロンプトの言語（ISO 639-1）
# country: 地域設定（ISO 3166-1 alpha-2）
locale:
  language: "ja"
  country: "JP"

# --- 検索クエリ ---
# Google AIO / AI Mode に送る検索クエリ
# ユーザーが実際に検索しそうなフレーズを設定する
queries:
  - "ノイズキャンセリングヘッドフォン おすすめ 2026"
  - "最新 ワイヤレスヘッドフォン 比較"
  - "オーラサウンド 評判"

# --- プロンプト ---
# ChatGPT / Gemini / Claude / Perplexity に送る構造化プロンプト
# category でグルーピングし、意図別に分析できる
#
# category の種類:
#   purchase_intent  - 購入・導入を検討する意図
#   info_gathering   - 情報収集・比較の意図
#   brand_direct     - ブランド名を直接指定した質問
#   neutral          - 特定意図のない一般的な質問
prompts:
  - id: "purchase-headphones"
    text: "仕事に集中するために、最強のノイズキャンセリングヘッドフォンを買いたいです。今のおすすめは何ですか？"
    category: purchase_intent

  - id: "brand-review"
    text: "オーラサウンドというブランドのヘッドフォンについて教えてください。特に音質と装着感の評判を知りたいです。"
    category: brand_direct

  - id: "compare-flagships"
    text: "最新のフラッグシップヘッドフォンの主要なモデルを比較して、それぞれのメリット・デメリットを教えてください。"
    category: info_gathering

# --- 対象AI ---
# モニタリングするAIサーフェスを選択
# 利用可能な値:
#   google_aio      - Google AI Overview（検索結果上部のAI要約）
#   google_ai_mode  - Google AI Mode（対話型検索）
#   perplexity      - Perplexity（Web検索AI）
#   chatgpt_web     - ChatGPT Web版
#   gemini_web      - Gemini Web版
#   claude          - Claude Web版 / Agent
targets:
  - google_aio
  - google_ai_mode
  - perplexity
  - chatgpt_web
  - gemini_web
  - claude

# --- 出力設定 ---
# dir: 出力先ディレクトリ（config.yaml からの相対パス）
# sheets.enabled: Google Sheetsへのエクスポートを有効にする（要 gog CLI）
output:
  dir: "outputs/"
  sheets:
    enabled: false
